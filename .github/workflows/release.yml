name: Build/release Electron app

on:
  repository_dispatch:
    types: [release]

jobs:
  release:
    permissions:
      contents: write

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Check out project
        uses: actions/checkout@v4
        with:
          repository: egoist/chatwise
          token: ${{ secrets.GH_TOKEN_FOR_CHECKOUT }}
          ref: ${{ github.event.client_payload.sha }}

      - uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: setup bun (for running scripts)
        uses: oven-sh/setup-bun@v2

      - name: Install posthog-cli
        run: |
          bun ./ensure-posthog.ts

      - name: Install Dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpx playwright install --with-deps

      - name: test
        run: pnpm --filter desktop-new test

      - name: build for mac
        run: pnpm --filter desktop-new release
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          POSTHOG_CLI_ENV_ID: ${{ secrets.POSTHOG_CLI_ENV_ID }}
          POSTHOG_CLI_TOKEN: ${{ secrets.POSTHOG_CLI_TOKEN }}
          NODE_OPTIONS: "--max_old_space_size=4096"
          MY_NAME: ${{ secrets.MY_NAME }}
          REDACT_2: ${{ secrets.REDACT_2 }}

      - name: build for win & linux
        run: pnpm --filter desktop-new release
        if: matrix.os != 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          POSTHOG_CLI_ENV_ID: ${{ secrets.POSTHOG_CLI_ENV_ID }}
          POSTHOG_CLI_TOKEN: ${{ secrets.POSTHOG_CLI_TOKEN }}
          NODE_OPTIONS: "--max_old_space_size=4096"
          MY_NAME: ${{ secrets.MY_NAME }}
          REDACT_2: ${{ secrets.REDACT_2 }}

  generate-releases-json:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check out releases repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check out source repo to get version
        uses: actions/checkout@v4
        with:
          repository: egoist/chatwise
          token: ${{ secrets.GH_TOKEN_FOR_CHECKOUT }}
          ref: ${{ github.event.client_payload.sha }}
          path: _chatwise-src
          sparse-checkout: desktop-new/package.json
          sparse-checkout-cone-mode: false

      - name: Read version from package.json
        id: read-version
        run: |
          echo "content=$(cat _chatwise-src/desktop-new/package.json)" >> $GITHUB_OUTPUT

      - name: Generate releases.json
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          VERSION: ${{ fromJson(steps.read-version.outputs.content).version }}
        run: bun ./generate-releases-json.ts
